<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ndaru Galaxy Supreme v12.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <!-- AI & 3D ENGINE -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
            }
        }
    </script>

    <style>
        :root { --neon: #00d2ff; --gold: #facc15; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Fredoka', sans-serif; color: white; touch-action: manipulation; }
        #canvas-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #video-ai { position: fixed; bottom: 10px; right: 10px; width: 100px; height: 75px; border: 2px solid var(--neon); border-radius: 10px; transform: scaleX(-1); z-index: 5; opacity: 0.5; }
        #ui-wrapper { position: relative; z-index: 10; height: 100vh; overflow-y: auto; pointer-events: auto; }
        
        .hud-card { background: rgba(10, 20, 45, 0.9); backdrop-filter: blur(20px); border: 2px solid var(--neon); border-radius: 30px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); }
        .text-neon { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-family: 'Orbitron', sans-serif; }

        /* BUTTONS */
        .btn-galaxy { background: linear-gradient(135deg, var(--gold), #eab308); color: #854d0e; font-weight: 800; border-radius: 15px; box-shadow: 0 5px 0 #a16207; transition: 0.1s; cursor: pointer; }
        .btn-galaxy:active { transform: translateY(3px); box-shadow: 0 2px 0 #a16207; }

        /* NAV LOG */
        #nav-log { background: rgba(0,0,0,0.5); border: 1px solid var(--neon); border-radius: 10px; min-height: 45px; display: flex; gap: 5px; padding: 5px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        .nav-step { width: 30px; height: 30px; background: var(--neon); border-radius: 5px; display: flex; items: center; justify-content: center; font-size: 16px; color: black; animation: pop 0.3s; }

        /* GRID */
        #grid-roket { width: 250px; height: 250px; display: grid; grid-template-columns: repeat(5, 50px); grid-template-rows: repeat(5, 50px); position: relative; border: 2px solid var(--neon); background: rgba(0,0,0,0.5); }
        .grid-line { border: 1px solid rgba(0, 210, 255, 0.15); }
        
        /* SPELLING SLOTS */
        .slot { width: 45px; height: 60px; border: 2px dashed var(--neon); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; background: rgba(0, 210, 255, 0.1); color: rgba(255, 255, 255, 0.15); }
        .slot-active { background: var(--neon) !important; color: white !important; border-style: solid; box-shadow: 0 0 10px var(--neon); transform: scale(1.1); }
        
        /* PUZZLE CARDS */
        .puz-card { width: 60px; height: 80px; perspective: 1000px; cursor: pointer; }
        .puz-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .puz-card.flipped .puz-inner { transform: rotateY(180deg); }
        .puz-front, .puz-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px; border: 1px solid var(--neon); display: flex; items: center; justify-content: center; }
        .puz-front { background: rgba(255,255,255,0.1); font-size: 1.5rem; color: var(--neon); }
        .puz-back { background: var(--neon); transform: rotateY(180deg); font-size: 1.8rem; }
        
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <video id="video-ai" playsinline></video>
    <div id="canvas-container"></div>

    <div id="ui-wrapper">
        <!-- 1. LOGIN -->
        <div id="login-screen" class="fixed inset-0 flex items-center justify-center p-6 text-center">
            <div class="w-full max-w-sm hud-card p-10 border-t-8 border-cyan-400">
                <img src="img/ndaru.png" class="w-24 h-24 mx-auto mb-6 rounded-full border-4 border-cyan-400 bg-white" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=Ndaru'">
                <h1 class="text-3xl font-bold mb-4 text-neon uppercase italic">Galaxy Hub</h1>
                <input type="text" id="input-nama" placeholder="NAMA KAPTEN?" class="w-full bg-slate-900 border-2 border-cyan-900 rounded-xl p-4 text-center text-white mb-6 outline-none font-bold">
                <button onclick="window.mulaiApp()" class="w-full btn-galaxy py-4 text-xl">LUNCURKAN 🚀</button>
            </div>
        </div>

        <!-- 2. MAIN APP -->
        <div id="main-app" class="hidden flex flex-col h-full p-4">
            <header class="flex justify-between items-center mb-4">
                <div class="hud-card px-4 py-2 border-l-4 border-cyan-400">
                    <span id="user-nama" class="font-bold text-white text-xs uppercase">PLAYER</span>
                    <span class="text-yellow-400 font-bold text-xs ml-3">⭐ <span id="star-count">0</span></span>
                </div>
                <div class="hud-card px-3 py-1 flex items-center gap-2">
                    <div id="ai-dot" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                    <span id="ai-label" class="text-[8px] font-mono text-gray-400 uppercase">AI SEARCHING</span>
                </div>
            </header>

            <main class="flex-1 flex flex-col items-center justify-center">
                <!-- DASHBOARD -->
                <section id="page-dashboard" class="page-content grid grid-cols-2 gap-4 w-full max-w-sm">
                    <button onclick="window.pindahHalaman('hewan')" class="hud-card p-6 flex flex-col items-center"><span class="text-4xl">🦁</span><b class="text-[9px] mt-2 uppercase">Bio-Scan</b></button>
                    <button onclick="window.pindahHalaman('roket')" class="hud-card p-6 flex flex-col items-center"><span class="text-4xl">🚀</span><b class="text-[9px] mt-2 uppercase">Navigasi</b></button>
                    <button onclick="window.pindahHalaman('hitung')" class="hud-card p-6 flex flex-col items-center"><span class="text-4xl">🍎</span><b class="text-[9px] mt-2 uppercase">Quantum</b></button>
                    <button onclick="window.pindahHalaman('puzzle')" class="hud-card p-6 flex flex-col items-center"><span class="text-4xl">🧩</span><b class="text-[9px] mt-2 uppercase">Memory</b></button>
                </section>

                <!-- GAME HEWAN -->
                <section id="page-hewan" class="page-content hidden flex flex-col items-center w-full max-w-sm">
                    <div class="hud-card p-6 w-full text-center">
                        <h2 class="text-neon text-[10px] font-bold mb-4 tracking-widest uppercase">Biological Identification</h2>
                        <div class="bg-black/40 border-2 border-cyan-500 rounded-2xl h-36 mb-6 flex justify-center items-center">
                            <img id="h-img" src="" class="h-full object-contain p-2">
                        </div>
                        <div id="h-slots" class="flex gap-1 justify-center mb-8"></div>
                        <div id="h-choices" class="flex gap-2 justify-center flex-wrap"></div>
                    </div>
                    <button onclick="window.pindahHalaman('dashboard')" class="mt-6 text-neon text-[9px] font-bold uppercase tracking-widest">⬅ Back To Hub</button>
                </section>

                <!-- GAME ROKET -->
                <section id="page-roket" class="page-content hidden flex flex-col items-center w-full">
                    <div class="hud-card p-4 text-center">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-neon text-[10px] font-bold uppercase tracking-widest">Navigation</h2>
                            <div class="text-[10px] font-bold bg-cyan-500/20 px-3 py-1 rounded-full border border-cyan-500">LVL <span id="r-lvl">1</span></div>
                        </div>
                        <div id="grid-roket" class="mx-auto mb-4">
                            <script>for(let i=0; i<25; i++) document.write('<div class="grid-line"></div>');</script>
                            <div id="sprite-roket" class="absolute w-[50px] h-[50px] flex items-center justify-center text-2xl" style="left:0; top:0; transition:0.4s; z-index:20;">🚀</div>
                            <div id="goal-roket" class="absolute w-[50px] h-[50px] flex items-center justify-center text-xl">🏁</div>
                            <div id="meteor-box"></div>
                        </div>
                        <div id="nav-log"></div>
                        <div class="grid grid-cols-5 gap-2 w-full max-w-xs mx-auto mb-4">
                            <button onclick="window.addCmd('up')" class="btn-galaxy p-2 flex flex-col items-center text-sm">⬆️<span class="text-[7px]">Atas</span></button>
                            <button onclick="window.addCmd('down')" class="btn-galaxy p-2 flex flex-col items-center text-sm">⬇️<span class="text-[7px]">Bawah</span></button>
                            <button onclick="window.addCmd('left')" class="btn-galaxy p-2 flex flex-col items-center text-sm">⬅️<span class="text-[7px]">Kiri</span></button>
                            <button onclick="window.addCmd('right')" class="btn-galaxy p-2 flex flex-col items-center text-sm">➡️<span class="text-[7px]">Kanan</span></button>
                            <button onclick="window.resetCmd()" class="bg-red-600 rounded-xl font-bold">✕</button>
                        </div>
                        <button onclick="window.runRoket()" class="w-full bg-green-600 py-3 rounded-xl font-bold uppercase text-xs">Engage Engine! 🚀</button>
                    </div>
                    <button onclick="window.pindahHalaman('dashboard')" class="mt-4 text-neon text-[9px] font-bold uppercase uppercase">⬅ Back To Hub</button>
                </section>

                <!-- GAME HITUNG -->
                <section id="page-hitung" class="page-content hidden flex flex-col items-center w-full max-w-sm">
                    <div class="hud-card p-10 w-full text-center">
                        <h2 class="text-neon text-[10px] font-bold mb-8 uppercase tracking-widest">Quantum Calculus</h2>
                        <div id="math-display" class="text-5xl mb-12 flex justify-center gap-2"></div>
                        <div id="math-options" class="grid grid-cols-3 gap-3"></div>
                    </div>
                    <button onclick="window.pindahHalaman('dashboard')" class="mt-8 text-neon text-[9px] font-bold uppercase">⬅ Back To Hub</button>
                </section>

                <!-- GAME PUZZLE -->
                <section id="page-puzzle" class="page-content hidden flex flex-col items-center w-full max-w-lg">
                    <div class="hud-card p-6 w-full text-center">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-neon text-[10px] font-bold uppercase tracking-widest">Memory Sync</h2>
                            <div class="bg-cyan-500/20 text-neon px-4 py-1 rounded-full text-[10px] font-bold border border-cyan-500/50">LEVEL <span id="puz-lvl">1</span></div>
                        </div>
                        <div id="puzzle-grid" class="flex flex-wrap justify-center gap-2"></div>
                    </div>
                    <button onclick="window.pindahHalaman('dashboard')" class="mt-6 text-neon text-[9px] font-bold uppercase">⬅ Back To Hub</button>
                </section>
            </main>
        </div>
    </div>

    <!-- LOGIC MASTER SCRIPT -->
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const state = { skor: 0, rPos: {x:0, y:0}, rGoal: {x:4, y:4}, rCmds: [], rLvl: 1, pLvl: 1, isFlying: false, handInf: 0, rotVel: {x:0, y:0} };

        // --- 1. ENGINE 3D NEBULA ---
        let scene, camera, renderer, composer, particles;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 35;
            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(25000 * 3);
            for (let i = 0; i < 25000; i++) {
                let r = (i < 9000) ? Math.random() * 4.5 : 11 + Math.random() * 4;
                let theta = Math.random() * Math.PI * 2, phi = Math.acos(2 * Math.random() - 1);
                pos[i*3] = r * Math.sin(phi) * Math.cos(theta); pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta); pos[i*3+2] = r * Math.cos(phi);
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particles = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.12, color: 0x00ffff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }));
            scene.add(particles);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.6, 0.4, 0.85));

            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.001 + state.rotVel.y;
                particles.rotation.x += state.rotVel.x;
                const s = 1 + (state.handInf * 1.5);
                particles.scale.lerp(new THREE.Vector3(s, s, s), 0.1);
                state.rotVel.y *= 0.95; state.rotVel.x *= 0.95;
                composer.render();
            }
            animate();
        }
        init3D();

        // --- 2. AI TANGAN ---
        const videoElement = document.getElementById('video-ai');
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults((res) => {
            const dot = document.getElementById('ai-dot');
            const label = document.getElementById('ai-label');
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                dot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#0f0]";
                label.innerText = "AI TRACKING";
                const lm = res.multiHandLandmarks[0];
                state.rotVel.y = (lm[8].x - 0.5) * 0.1;
                state.rotVel.x = (lm[8].y - 0.5) * 0.1;
                state.handInf = Math.hypot(lm[4].x - lm[20].x, lm[4].y - lm[20].y) * 2.5;
            } else {
                dot.className = "w-2 h-2 rounded-full bg-red-500 animate-pulse";
                label.innerText = "AI SEARCHING";
                state.handInf = 0;
            }
        });

        // --- 3. FUNCTIONS ---
        function suara(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'id-ID'; u.rate = 1.1; window.speechSynthesis.speak(u);
        }

        window.mulaiApp = () => {
            const v = document.getElementById('input-nama').value;
            if(!v) return bicara("Ketik namamu dulu Kapten!");
            document.getElementById('user-nama').innerText = v.toUpperCase();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            new Camera(videoElement, { onFrame: async () => { await hands.send({ image: videoElement }); }, width: 640, height: 480 }).start();
            suara("Selamat datang Commander " + v);
            window.pindahHalaman('dashboard');
        };

        window.pindahHalaman = (id) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            if(id === 'hewan') initHewan();
            if(id === 'roket') initRoket();
            if(id === 'hitung') initHitung();
            if(id === 'puzzle') initPuzzle();
        };

        // --- GAME HEWAN ---
        const hData = [{img:'img/anjing.png',k:'ANJING'},{img:'img/gajah.png',k:'GAJAH'},{img:'img/sapi.png',k:'SAPI'},{img:'img/singa.png',k:'SINGA'},{img:'img/monyet.png',k:'MONYET'},{img:'img/kucing.png',k:'KUCING'}];
        function initHewan() {
            const h = hData[Math.floor(Math.random()*hData.length)];
            state.hTarget = h.k; state.hIndex = 0;
            document.getElementById('h-img').src = h.img;
            document.getElementById('h-img').onerror = () => document.getElementById('h-img').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${h.k}`;
            const sBox = document.getElementById('h-slots'); sBox.innerHTML = "";
            const hBox = document.getElementById('h-choices'); hBox.innerHTML = "";
            h.k.split('').forEach(char => { sBox.innerHTML += `<div class="slot">${char}</div>`; });
            h.k.split('').sort(()=>Math.random()-0.5).forEach(char => {
                const b = document.createElement('div'); b.className = "key-btn transition active:scale-90"; b.innerText = char;
                b.onclick = () => {
                    if (char === state.hTarget[state.hIndex]) {
                        sBox.children[state.hIndex].classList.add('slot-active');
                        state.hIndex++; b.style.visibility = 'hidden'; suara(char);
                        if (state.hIndex === state.hTarget.length) { confetti(); state.skor += 20; updateUI(); setTimeout(initHewan, 2500); }
                    } else suara("Salah");
                };
                hBox.appendChild(b);
            });
        }

        // --- GAME ROKET (LEVELS) ---
        function initRoket() {
            state.rPos = {x:0, y:0}; state.rCmds = []; state.isFlying = false;
            document.getElementById('nav-log').innerHTML = "";
            document.getElementById('r-lvl').innerText = state.rLvl;
            
            // Randomize Goal
            state.rGoal = { x: Math.floor(Math.random()*3)+2, y: Math.floor(Math.random()*3)+2 };
            document.getElementById('goal-roket').style.left = (state.rGoal.x*50)+'px';
            document.getElementById('goal-roket').style.top = (state.rGoal.y*50)+'px';

            const mBox = document.getElementById('meteor-box'); mBox.innerHTML = "";
            const meteorCount = Math.min(state.rLvl + 2, 8);
            state.rMeteors = [];
            for(let i=0; i<meteorCount; i++) {
                let mx, my;
                do { mx=Math.floor(Math.random()*5); my=Math.floor(Math.random()*5); }
                while((mx===0&&my===0) || (mx===state.rGoal.x&&my===state.rGoal.y));
                state.rMeteors.push({x:mx, y:my});
                mBox.innerHTML += `<div class="meteor absolute w-[50px] h-[50px] flex items-center justify-center text-xl" style="left:${mx*50}px; top:${my*50}px">☄️</div>`;
            }
            document.getElementById('sprite-roket').style.left = '0'; document.getElementById('sprite-roket').style.top = '0';
        }
        window.addCmd = (d) => {
            if(state.rCmds.length < 8) {
                state.rCmds.push(d);
                const icons = {up:'⬆️', down:'⬇️', left:'⬅️', right:'➡️'};
                document.getElementById('nav-log').innerHTML += `<div class="nav-step">${icons[d]}</div>`;
                suara(d);
            }
        };
        window.resetCmd = () => { state.rCmds = []; document.getElementById('nav-log').innerHTML = ""; suara("Reset"); };
        window.runRoket = async () => {
            if(state.isFlying || state.rCmds.length === 0) return;
            state.isFlying = true;
            for(let c of state.rCmds) {
                if(c==='up'&&state.rPos.y>0) state.rPos.y--;
                if(c==='down'&&state.rPos.y<4) state.rPos.y++;
                if(c==='left'&&state.rPos.x>0) state.rPos.x--;
                if(c==='right'&&state.rPos.x<4) state.rPos.x++;
                document.getElementById('sprite-roket').style.left = (state.rPos.x*50)+'px';
                document.getElementById('sprite-roket').style.top = (state.rPos.y*50)+'px';
                if(state.rMeteors.find(m => m.x===state.rPos.x && m.y===state.rPos.y)) { suara("Nabrak!"); initRoket(); return; }
                await new Promise(r => setTimeout(r, 500));
            }
            if(state.rPos.x===state.rGoal.x && state.rPos.y===state.rGoal.y) { 
                confetti(); state.skor+=50; state.rLvl++; updateUI(); suara("Berhasil!"); 
            }
            setTimeout(initRoket, 1500);
        };

        // --- GAME HITUNG (FIXED) ---
        function initHitung() {
            const a=Math.floor(Math.random()*5)+1, b=Math.floor(Math.random()*4)+1, res=a+b;
            const d=document.getElementById('math-display'); d.innerHTML="";
            for(let i=0; i<a; i++) d.innerHTML+="🍎";
            d.innerHTML+=" + ";
            for(let i=0; i<b; i++) d.innerHTML+="🍎";
            const oBox = document.getElementById('math-options'); oBox.innerHTML = "";
            let opts = [res, res+1, res-1, res+2].filter(v => v > 0);
            opts = [...new Set(opts)].sort(()=>Math.random()-0.5).slice(0,3);
            opts.forEach(v => {
                const b = document.createElement('button'); b.className="hud-card p-4 text-3xl font-bold active:scale-90 transition"; b.innerText=v;
                b.onclick=()=>{ 
                    if(v===res){ confetti(); state.skor+=10; updateUI(); suara("Pintar!"); initHitung(); }
                    else suara("Coba lagi");
                };
                oBox.appendChild(b);
            });
        }

        // --- GAME PUZZLE (LEVELS) ---
        function initPuzzle() {
            const grid = document.getElementById('puzzle-grid'); grid.innerHTML = "";
            document.getElementById('puz-lvl').innerText = state.pLvl;
            let pairs = state.pLvl === 1 ? 2 : (state.pLvl === 2 ? 3 : (state.pLvl === 3 ? 4 : 6));
            const all = ['🐶','🐱','🐭','🐰','🦁','🐮','🐸','🐼','🐷','🐵','🐯','🦒'];
            const icons = all.sort(()=>Math.random()-0.5).slice(0, pairs);
            const gameIcons = [...icons, ...icons].sort(()=>Math.random()-0.5);
            let flipped = [], matched = 0;
            gameIcons.forEach(ic => {
                const card = document.createElement('div'); card.className = "puz-card";
                card.innerHTML = `<div class="puz-inner"><div class="puz-front">?</div><div class="puz-back">${ic}</div></div>`;
                card.onclick = () => {
                    if (flipped.length < 2 && !card.classList.contains('flipped')) {
                        card.classList.add('flipped'); flipped.push({ic, card});
                        if (flipped.length === 2) {
                            if (flipped[0].ic === flipped[1].ic) { matched++; flipped = []; if (matched === pairs) { confetti(); state.skor+=30; state.pLvl++; updateUI(); setTimeout(initPuzzle, 1500); } }
                            else { setTimeout(() => { flipped.forEach(f => f.card.classList.remove('flipped')); flipped = []; }, 800); }
                        }
                    }
                };
                grid.appendChild(card);
            });
        }

        const updateUI = () => { document.getElementById('star-count').innerText = state.skor; };
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
